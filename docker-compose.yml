services:
  postgres:
    image: postgres:16-alpine
    container_name: healthqueue_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: healthqueue
      POSTGRES_PASSWORD: healthqueue_password
      POSTGRES_DB: healthqueue_db
    ports:
      - "5433:5432"
    volumes: 
      - pgdata:/var/lib/postgresql/data
      - ./migrations:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U healthqueue -d healthqueue_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: healthqueue_redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redisdata:/data
    command: redis-server --appendonly yes
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

volumes:
  pgdata:
  redisdata: